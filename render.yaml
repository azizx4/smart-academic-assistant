services:
  - type: web
    name: sara-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && cd ../client && npm install --include=dev && npm run build
    startCommand: cd server && npx prisma migrate deploy && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sara-db
          property: connectionString

databases:
  - name: sara-db
    plan: free
    region: frankfurt
